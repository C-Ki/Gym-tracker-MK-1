<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GYM LOG</title>
<style>
  :root {
    --bg: #0d0d0f;
    --card: #17171b;
    --card2: #1f1f25;
    --border: #2a2a32;
    --text: #e8e8ec;
    --dim: #8a8a95;
    --accent: #4ade80;
    --accent-dim: #1a3326;
    --red: #f87171;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 560px;
    margin: 0 auto;
    padding: 20px 14px 80px;
  }
  h1 {
    font-size: 20px;
    letter-spacing: 4px;
    text-align: center;
    margin-bottom: 18px;
    color: var(--accent);
    font-weight: 800;
  }

  /* body part tabs */
  .tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 6px;
    margin-bottom: 14px;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 0 0 auto;
    padding: 7px 14px;
    border-radius: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--dim);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
  }
  .tab.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* exercise card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px;
    cursor: pointer;
  }
  .ex-name { font-size: 15px; font-weight: 700; }
  .ex-part { font-size: 11px; color: var(--dim); margin-top: 2px; text-transform: uppercase; letter-spacing: 1px; }
  .ex-weight { font-size: 20px; font-weight: 800; color: var(--accent); white-space: nowrap; }
  .ex-weight small { font-size: 11px; color: var(--dim); font-weight: 600; }

  .card-body { display: none; padding: 0 14px 14px; }
  .card.open .card-body { display: block; }

  .log-row { display: flex; gap: 6px; margin-bottom: 12px; }
  .log-row input {
    flex: 1;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 16px;
    padding: 10px 8px;
    outline: none;
    min-width: 0;
    text-align: center;
  }
  .log-row input.w { flex: 1.4; }
  .log-row input:focus { border-color: var(--accent); }
  .btn {
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 800;
    padding: 10px 18px;
    cursor: pointer;
  }
  .btn-ghost {
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    border-radius: 10px;
    font-size: 12px;
    padding: 8px 12px;
    cursor: pointer;
  }
  .btn-ghost.danger { color: var(--red); }
  .btn-ghost.danger.armed { background: var(--red); border-color: var(--red); color: #0d0d0f; font-weight: 800; }

  svg.chart { width: 100%; height: 140px; display: block; margin-bottom: 10px; }

  .history { font-size: 12px; color: var(--dim); max-height: 130px; overflow-y: auto; margin-bottom: 10px; }
  .history div {
    display: flex;
    justify-content: space-between;
    padding: 5px 2px;
    border-bottom: 1px solid var(--border);
  }
  .history b { color: var(--text); }
  .history span.del { color: var(--red); cursor: pointer; padding: 0 6px; }

  .empty { text-align: center; color: var(--dim); font-size: 13px; padding: 40px 0; }

  /* add exercise */
  .fab {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 800;
    padding: 14px 26px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(74, 222, 128, .25);
  }
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 10;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    width: 100%;
    max-width: 360px;
  }
  .modal h2 { font-size: 15px; margin-bottom: 14px; }
  .modal input, .modal select {
    width: 100%;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 16px;
    padding: 11px 12px;
    margin-bottom: 10px;
    outline: none;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal .row { display: flex; gap: 8px; margin-top: 4px; }
  .modal .row button { flex: 1; }
</style>
</head>
<body>

<h1>GYM LOG</h1>

<div class="tabs" id="tabs"></div>
<div id="list"></div>

<button class="fab" id="fab" onclick="openModal()">+ New Exercise</button>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>New Exercise</h2>
    <input id="newName" placeholder="Exercise name (e.g. Bench Press)" maxlength="40">
    <select id="newPart"></select>
    <div class="row">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="addExercise()">Add</button>
    </div>
  </div>
</div>

<script>
const PARTS = ["Chest", "Back", "Shoulder", "Leg", "Arm", "Core"];
const KEY = "gymLogData";

let data = JSON.parse(localStorage.getItem(KEY) || '{"exercises":[]}');
let filter = "All";
let openId = null;
let confirmDel = null;

function save() { localStorage.setItem(KEY, JSON.stringify(data)); }

/* ---------- tabs ---------- */
function renderTabs() {
  const tabs = ["All", ...PARTS];
  document.getElementById("tabs").innerHTML = tabs.map(t =>
    `<div class="tab ${t === filter ? "active" : ""}" onclick="setFilter('${t}')">${t}</div>`
  ).join("");
}
function setFilter(t) { filter = t; confirmDel = null; renderTabs(); renderList(); }

/* ---------- list ---------- */
function renderList() {
  const list = document.getElementById("list");
  const items = data.exercises.filter(e => filter === "All" || e.part === filter);
  if (!items.length) {
    list.innerHTML = `<div class="empty">No exercises yet.<br>Tap "+ New Exercise" to start.</div>`;
    return;
  }
  list.innerHTML = items.map(e => {
    const lastLog = e.logs.length ? e.logs[e.logs.length - 1] : null;
    const last = lastLog ? lastLog.weight : null;
    const open = e.id === openId;
    return `
    <div class="card ${open ? "open" : ""}">
      <div class="card-head" onclick="toggle('${e.id}')">
        <div>
          <div class="ex-name">${esc(e.name)}</div>
          <div class="ex-part">${e.part}</div>
        </div>
        <div class="ex-weight">${last !== null ? last + ' <small>kg' + srText(lastLog) + '</small>' : '<small>—</small>'}</div>
      </div>
      <div class="card-body">
        <div class="log-row">
          <input type="number" inputmode="decimal" step="0.5" id="w-${e.id}" class="w" placeholder="kg"
                 onkeydown="if(event.key==='Enter')logWeight('${e.id}')">
          <input type="number" inputmode="numeric" id="s-${e.id}" placeholder="Sets"
                 onkeydown="if(event.key==='Enter')logWeight('${e.id}')">
          <input type="number" inputmode="numeric" id="r-${e.id}" placeholder="Reps"
                 onkeydown="if(event.key==='Enter')logWeight('${e.id}')">
          <button class="btn" onclick="logWeight('${e.id}')">Log</button>
        </div>
        ${chart(e)}
        ${history(e)}
        <button class="btn-ghost danger ${confirmDel === e.id ? "armed" : ""}" onclick="delExercise('${e.id}')">${confirmDel === e.id ? "Tap again to delete" : "Delete exercise"}</button>
      </div>
    </div>`;
  }).join("");
  document.getElementById("fab").style.display = openId ? "none" : "";
}

function toggle(id) {
  openId = openId === id ? null : id;
  confirmDel = null;
  renderList();
  if (openId) setTimeout(() => { const i = document.getElementById("w-" + id); if (i) i.focus(); }, 50);
}

/* ---------- chart (pure SVG) ---------- */
function chart(e) {
  const logs = e.logs.slice(-20); // last 20 entries
  if (logs.length < 2) return `<div style="color:var(--dim);font-size:12px;margin-bottom:10px">Log 2+ entries to see the trend graph.</div>`;
  const W = 520, H = 140, P = 26;
  const ws = logs.map(l => l.weight);
  let min = Math.min(...ws), max = Math.max(...ws);
  if (min === max) { min -= 1; max += 1; }
  const x = i => P + i * (W - 2 * P) / (logs.length - 1);
  const y = w => H - P - (w - min) * (H - 2 * P) / (max - min);
  const pts = logs.map((l, i) => `${x(i)},${y(l.weight)}`).join(" ");
  const dots = logs.map((l, i) =>
    `<circle cx="${x(i)}" cy="${y(l.weight)}" r="3.5" fill="var(--accent)"/>`).join("");
  const first = logs[0], lastL = logs[logs.length - 1];
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
    ${dots}
    <text x="${P}" y="14" fill="var(--dim)" font-size="11">${max} kg</text>
    <text x="${P}" y="${H - 6}" fill="var(--dim)" font-size="11">${min} kg</text>
    <text x="${W - P}" y="${H - 6}" fill="var(--dim)" font-size="11" text-anchor="end">${lastL.date.slice(5)}</text>
    <text x="${W - P}" y="14" fill="var(--accent)" font-size="11" text-anchor="end">${lastL.weight - first.weight >= 0 ? "+" : ""}${Math.round((lastL.weight - first.weight) * 10) / 10} kg</text>
  </svg>`;
}

/* ---------- history ---------- */
function history(e) {
  if (!e.logs.length) return "";
  const rows = e.logs.slice().reverse().slice(0, 15).map((l, i) => {
    const realIdx = e.logs.length - 1 - i;
    return `<div><span>${l.date}</span><span><b>${l.weight} kg</b>${srText(l)} <span class="del" onclick="delLog('${e.id}',${realIdx})">×</span></span></div>`;
  }).join("");
  return `<div class="history">${rows}</div>`;
}

/* ---------- actions ---------- */
function logWeight(id) {
  const input = document.getElementById("w-" + id);
  const w = parseFloat(input.value);
  if (isNaN(w) || w <= 0) { input.focus(); return; }
  const sets = parseInt(document.getElementById("s-" + id).value) || null;
  const reps = parseInt(document.getElementById("r-" + id).value) || null;
  const e = data.exercises.find(e => e.id === id);
  const log = { date: new Date().toISOString().slice(0, 10), weight: w };
  if (sets) log.sets = sets;
  if (reps) log.reps = reps;
  e.logs.push(log);
  confirmDel = null;
  save(); renderList();
}

function delLog(id, idx) {
  const e = data.exercises.find(e => e.id === id);
  e.logs.splice(idx, 1);
  save(); renderList();
}

function delExercise(id) {
  if (confirmDel !== id) {
    confirmDel = id;
    renderList();
    return;
  }
  data.exercises = data.exercises.filter(e => e.id !== id);
  openId = null;
  confirmDel = null;
  save(); renderList();
}

/* ---------- modal ---------- */
function openModal() {
  document.getElementById("newPart").innerHTML =
    PARTS.map(p => `<option ${p === filter ? "selected" : ""}>${p}</option>`).join("");
  document.getElementById("newName").value = "";
  document.getElementById("modalBg").classList.add("show");
  document.getElementById("newName").focus();
}
function closeModal() { document.getElementById("modalBg").classList.remove("show"); }

function addExercise() {
  const name = document.getElementById("newName").value.trim();
  if (!name) return;
  const part = document.getElementById("newPart").value;
  const ex = { id: "e" + Date.now(), name, part, logs: [] };
  data.exercises.push(ex);
  filter = part;
  openId = ex.id;
  save(); closeModal(); renderTabs(); renderList();
}

function esc(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/"/g, "&quot;"); }

function srText(l) {
  if (!l || (!l.sets && !l.reps)) return "";
  return ` · ${l.sets || "?"}×${l.reps || "?"}`;
}

renderTabs();
renderList();
</script>
</body>
</html>
